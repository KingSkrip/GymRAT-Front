<!-- Backdrop -->
<div class="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm" (click)="closed.emit()"></div>

<div
  class="fixed z-50 bg-white dark:bg-black border border-black/10 dark:border-white/10 shadow-2xl bottom-[60px] left-0 right-0 rounded-t-3xl md:bottom-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-[440px] md:rounded-3xl max-h-[90vh] flex flex-col transition-transform duration-150"
  [style.transform]="drawerDeltaY > 0 ? 'translateY(' + drawerDeltaY + 'px)' : ''"
>
  <!-- Drag handle -->
  <div
    class="md:hidden flex justify-center pt-4 pb-2 cursor-grab active:cursor-grabbing touch-none"
    (touchstart)="onDrawerTouchStart($event)"
    (touchmove)="onDrawerTouchMove($event)"
    (touchend)="onDrawerTouchEnd()"
  >
    <div class="w-10 h-1 rounded-full bg-primary-500"></div>
  </div>

  <div class="overflow-y-auto flex-1 px-6 pb-6">
    <!-- Header del rol -->
    <div class="flex items-center gap-3 pt-2 md:pt-4 mb-5">
      <div
        class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary-500 dark:bg-secondary-300/90 shrink-0"
      >
        <mat-icon
          svgIcon="heroicons_solid:shield-check"
          class="icon-size-5 text-white dark:text-black"
        ></mat-icon>
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-black dark:text-white leading-tight truncate">
          {{ subRole.name }}
        </p>
        <p class="text-xs text-black/60 dark:text-white/60 mt-0.5">
          {{ subRole.users_count }} usuario{{ subRole.users_count === 1 ? '' : 's' }} asignados
        </p>
      </div>
      <!-- Close desktop -->
      <button
        (click)="closed.emit()"
        class="hidden md:flex p-2 rounded-xl hover:bg-black/5 dark:hover:bg-white/10 transition-colors"
      >
        <mat-icon
          svgIcon="heroicons_solid:x-mark"
          class="icon-size-4 text-black dark:text-white"
        ></mat-icon>
      </button>
    </div>

    <!-- Descripción -->
    @if (subRole.description) {
      <div class="rounded-xl bg-secondary-400/30 dark:bg-secondary-400/5 px-4 py-3 mb-5">
        <p class="text-xs text-black/70 dark:text-white/70">{{ subRole.description }}</p>
      </div>
    }

    <!-- Stats -->
    <div class="grid grid-cols-2 gap-3 mb-5">
      <div class="rounded-xl bg-secondary-400/30 dark:bg-secondary-400/5 p-3 flex flex-col gap-0.5">
        <span class="text-xs text-black/60 dark:text-white/60">Usuarios</span>
        <span class="text-lg font-bold text-black dark:text-white">{{ subRole.users_count }}</span>
      </div>
      <div class="rounded-xl bg-secondary-400/30 dark:bg-secondary-400/5 p-3 flex flex-col gap-0.5">
        <span class="text-xs text-black/60 dark:text-white/60">SubsubRoles</span>
        <span class="text-lg font-bold text-black dark:text-white">{{
          subRole.sub_subRoles_count ?? 0
        }}</span>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="grid grid-cols-2 gap-2">
      <button
        (click)="editSubRole.emit(subRole)"
        class="flex items-center justify-center gap-2 rounded-xl border border-black/10 dark:border-white/10 px-4 py-3 text-sm text-black dark:text-white hover:bg-black/5 dark:hover:bg-white/5 transition-colors duration-150"
      >
        <mat-icon svgIcon="heroicons_outline:pencil-square" class="icon-size-4"></mat-icon>
        Editar
      </button>
      <button
        (click)="deleteSubRole.emit(subRole)"
        class="flex items-center justify-center gap-2 rounded-xl border border-red-500/20 bg-red-500/5 px-4 py-3 text-sm text-red-500 hover:bg-red-500/10 transition-colors duration-150"
      >
        <mat-icon svgIcon="heroicons_outline:trash" class="icon-size-4"></mat-icon>
        Eliminar
      </button>
    </div>
  </div>
</div>
