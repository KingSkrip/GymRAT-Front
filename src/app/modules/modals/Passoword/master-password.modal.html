 <div class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center">
      <div class="bg-white dark:bg-black border border-black/10 dark:border-white/10 rounded-3xl p-6 w-[340px] flex flex-col gap-4 shadow-2xl">
        
        <h2 class="text-base font-semibold text-black dark:text-white">Confirmar acción</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Ingresa la contraseña maestra para continuar.
        </p>

        <input
          type="password"
          [(ngModel)]="password"
          placeholder="Contraseña maestra"
          class="rounded-xl border border-black dark:border-white/20 bg-secondary-400/30 dark:bg-secondary-400/5 px-4 py-3 text-black dark:text-white text-sm w-full"
        />

        @if (error) {
          <p class="text-red-500 text-xs">{{ error }}</p>
        }

        <div class="flex gap-3">
          <button
            (click)="cancelled.emit()"
            class="flex-1 rounded-xl py-3 text-sm bg-red-500/10 border border-red-500/30 text-red-500 hover:bg-red-500/20 transition-colors"
          >
            Cancelar
          </button>
          <button
            (click)="confirm()"
            class="flex-1 rounded-xl py-3 text-sm bg-primary-500 hover:bg-accent-500 text-white font-medium transition-colors"
          >
            Confirmar
          </button>
        </div>

      </div>
    </div>
