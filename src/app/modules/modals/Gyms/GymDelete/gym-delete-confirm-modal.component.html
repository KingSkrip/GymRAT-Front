<div
  class="fixed z-50 bg-white dark:bg-neutral-950 border border-black/10 dark:border-white/10 shadow-2xl bottom-[60px] py-5 px-5 left-0 right-0 rounded-t-3xl md:bottom-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-[400px] md:rounded-3xl p-6"
  [style.transform]="drawerDeltaY > 0 ? 'translateY(' + drawerDeltaY + 'px)' : ''"
>
  <!-- Drag handle (mobile) -->
  <div
    class="md:hidden flex justify-center mb-4 -mt-2 cursor-grab active:cursor-grabbing touch-none"
    (touchstart)="onDrawerTouchStart($event)"
    (touchmove)="onDrawerTouchMove($event)"
    (touchend)="onDrawerTouchEnd()"
  >
    <div class="w-10 h-1 rounded-full bg-primary-500"></div>
  </div>

  <!-- Icon -->
  <div class="flex items-center justify-center w-12 h-12 rounded-2xl mb-4 bg-red-500/10 mx-auto">
    <svg class="w-5 h-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
    </svg>
  </div>

  <h3 class="text-base font-semibold text-black dark:text-white text-center mb-1">
    Eliminar gym
  </h3>
  <p class="text-sm text-gray-400 text-center mb-1">
    Estás a punto de eliminar
    <span class="font-medium text-secondary-500 dark:text-primary-500">{{ gym.name }}</span>.
  </p>
  <p class="text-xs text-red-500 text-center mb-6">Esta acción no se puede deshacer.</p>

  <div class="flex gap-3">
    <button
      (click)="closed.emit()"
      class="flex-1 rounded-xl py-3 bg-red-500/10 border border-red-500/30 text-red-500 hover:bg-red-500/20 text-sm transition-colors duration-150"
    >
      Cancelar
    </button>
    <button
      (click)="confirm()"
      [disabled]="saving"
      class="flex-1 rounded-xl bg-primary-500 hover:bg-accent-500 text-white py-3 text-sm font-medium disabled:opacity-40 transition-all duration-150"
    >
      {{ saving ? 'Eliminando…' : 'Eliminar' }}
    </button>
  </div>
</div>
