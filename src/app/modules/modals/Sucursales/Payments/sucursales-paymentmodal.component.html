<!-- Backdrop -->
<div class="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm" (click)="closed.emit()"></div>

<div
  class="fixed z-50 bg-white dark:bg-black border border-black/10 dark:border-white/10 shadow-2xl bottom-[60px] left-0 right-0 rounded-t-3xl md:bottom-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-[500px] md:rounded-3xl max-h-[90vh] flex flex-col transition-transform duration-150"
  [style.transform]="drawerDeltaY > 0 ? 'translateY(' + drawerDeltaY + 'px)' : ''"
>
  <!-- Drag handle (mobile) -->
  <div
    class="md:hidden flex justify-center pt-4 pb-1 cursor-grab active:cursor-grabbing touch-none"
    (touchstart)="onDrawerTouchStart($event)"
    (touchmove)="onDrawerTouchMove($event)"
    (touchend)="onDrawerTouchEnd()"
  >
    <div class="w-10 h-1 rounded-full bg-primary-500"></div>
  </div>

  <!-- Header -->
  <div class="flex items-center justify-between px-6 pt-4 pb-4 md:pt-6">
    <h2 class="text-base font-semibold text-black dark:text-white">Registrar pago</h2>
    <button
      (click)="closed.emit()"
      class="p-2 rounded-xl hover:bg-black/5 dark:hover:bg-white/10 transition-colors"
    >
      <svg
        class="w-4 h-4 text-gray-500"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Form -->
  <div class="overflow-y-auto flex-1 px-6 pb-6">
    @if (subscription) {
      <p class="text-xs text-black dark:text-white mb-4">
        Plan {{ planLabel(subscription.plan) }} · vence
        {{ subscription.ends_at | date: 'dd/MM/yyyy' }}
      </p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <!-- Monto -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-black dark:text-white">
          Monto (MXN) <span class="text-red-500">*</span>
        </label>
        <input
          formControlName="amount"
          type="number"
          min="0"
          step="0.01"
          placeholder="0.00"
          class="w-full rounded-xl border border-black/10 dark:border-white/10 bg-secondary-400/30 dark:bg-secondary-400/5 px-4 py-2.5 text-sm text-black dark:text-white placeholder-gray-400 outline-none focus:border-black/30 dark:focus:border-white/30 transition-colors duration-150"
        />
        @if (hasError('amount')) {
          <p class="text-xs text-red-500">El monto es requerido</p>
        }
      </div>

      <!-- Estado -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-black dark:text-white">
          Estado <span class="text-red-500">*</span>
        </label>
        <select
          formControlName="status"
          class="w-full rounded-xl border border-black/10 dark:border-white/10 bg-secondary-400/30 dark:bg-secondary-400/5 px-4 py-2.5 text-sm text-black dark:text-white outline-none focus:border-black/30 dark:focus:border-white/30 transition-colors duration-150 appearance-none"
        >
          <option value="paid">Pagado</option>
          <option value="pending">Pendiente</option>
          <option value="failed">Fallido</option>
          <option value="cancelled">Cancelado</option>
        </select>
      </div>

      <!-- Método de pago -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-black dark:text-white">Método de pago</label>
        <input
          formControlName="payment_method"
          placeholder="Ej. transferencia, efectivo, tarjeta…"
          class="w-full rounded-xl border border-black/10 dark:border-white/10 bg-secondary-400/30 dark:bg-secondary-400/5 px-4 py-2.5 text-sm text-black dark:text-white placeholder-gray-400 outline-none focus:border-black/30 dark:focus:border-white/30 transition-colors duration-150"
        />
      </div>

      <!-- ID transacción -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-black dark:text-white">ID de transacción</label>
        <input
          formControlName="transaction_id"
          placeholder="Ej. TXN-00123"
          class="w-full rounded-xl border border-black/10 dark:border-white/10 bg-secondary-400/30 dark:bg-secondary-400/5 px-4 py-2.5 text-sm text-black dark:text-white placeholder-gray-400 outline-none focus:border-black/30 dark:focus:border-white/30 transition-colors duration-150"
        />
      </div>

      <!-- Fecha pago -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-black dark:text-white">Fecha y hora del pago</label>
        <input
          formControlName="paid_at"
          type="datetime-local"
          class="w-full rounded-xl border border-black/10 dark:border-white/10 bg-secondary-400/30 dark:bg-secondary-400/5 px-4 py-2.5 text-sm text-black dark:text-white outline-none focus:border-black/30 dark:focus:border-white/30 transition-colors duration-150"
        />
      </div>

      <!-- Form error -->
      @if (formError) {
        <div
          class="rounded-xl border border-red-500/20 bg-red-500/5 px-4 py-3 text-xs text-red-500"
        >
          {{ formError }}
        </div>
      }

      <!-- Actions -->
      <div class="flex gap-3 pt-1">
        <button
          type="button"
          (click)="closed.emit()"
          class="flex-1 rounded-xl py-3 text-sm bg-red-500/10 border border-red-500/30 text-red-500 hover:bg-red-500/20 transition-colors duration-150"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="saving"
          class="flex-1 rounded-xl bg-primary-500 hover:bg-accent-500 text-white py-3 text-sm font-medium hover:opacity-80 disabled:opacity-40 transition-all duration-150"
        >
          {{ saving ? 'Registrando…' : 'Registrar pago' }}
        </button>
      </div>
    </form>
  </div>
</div>
