<!-- Sidebar: solo visible en md+, oculto en móvil -->
<aside
  class="hidden md:relative md:flex md:h-screen md:flex-col border-r border-black/10 bg-white text-black transition-all duration-300 ease-in-out dark:border-white/10 dark:bg-black dark:text-white"
  [style.width]="layoutService.sidebarWidth()"
  [attr.data-collapsed]="layoutService.isSidebarCollapsed() ? 'true' : null"
>
  <!-- Header / Logo -->
  <div
    class="flex h-16 items-center border-b border-accent-500 dark:border-secondary-500"
    [class.justify-center]="layoutService.isSidebarCollapsed()"
    [class.px-4]="!layoutService.isSidebarCollapsed()"
  >
    <div class="logo-container overflow-hidden">
      @if (layoutService.isSidebarCollapsed()) {
        <img [src]="config.logo" alt="Logo" class="h-8 w-8 object-contain" />
      } @else {
        <img [src]="config.logoText" alt="Logo Text" class="h-15 mt-5 w-auto object-contain" />
      }
    </div>
  </div>

  <!-- Navigation -->
  <div
    class="flex-1 overflow-y-auto overflow-x-hidden py-3 scrollbar-thin scrollbar-thumb-black/10 dark:scrollbar-thumb-white/10"
  >
    <app-navigation />
  </div>

  <!-- Collapse button -->
  <div class="absolute -right-3 top-20 z-50">
    <button
      type="button"
      class="flex h-7 w-7 items-center justify-center rounded-full border border-black/10 bg-white text-black shadow-lg transition hover:bg-secondary-500 hover:text-white dark:border-white/10 dark:bg-black dark:text-white dark:hover:bg-accent-500 dark:hover:text-white"
      (click)="toggleCollapse()"
    >
      @if (layoutService.isSidebarCollapsed()) {
        <mat-icon svgIcon="heroicons_outline:chevron-double-right" class="!h-4 !w-4"></mat-icon>
      } @else {
        <mat-icon svgIcon="heroicons_outline:chevron-double-left" class="!h-4 !w-4"></mat-icon>
      }
    </button>
  </div>
</aside>
